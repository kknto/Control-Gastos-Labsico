services:
  - type: web
    name: supervivencia-semanal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supervivencia-db
          property: connectionString

databases:
  - name: supervivencia-db
    databaseName: supervivencia
    user: supervivencia_user
    plan: free
